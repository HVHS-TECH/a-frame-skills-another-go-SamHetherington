<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="lightblue"></a-sky>
            
             <sphere> 
                 <a-sphere colour="red"
                 animation="
                 property=position
                 from: 0 -5 2;
                 to: 0 5 2;
                 loop: true;
                 dir: alternate;


             "></a-sphere>
             </sphere>


        </a-scene>
    </body>
</html>
